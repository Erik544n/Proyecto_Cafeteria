services:

  # ─────────────────────────────────────────
  # 1. API PRINCIPAL  ──  FastAPI + Python
  #    Lógica del negocio: pedidos, cocina,
  #    caja, mesero, inventario, ventas, auth
  # ─────────────────────────────────────────
  cafeteria_api:
    build:
      context: ./API
    container_name: cafeteria_api
    restart: unless-stopped
    ports:
      - "8000:8000"        # http://localhost:8000
    volumes:
      - ./API:/app         # hot-reload en desarrollo
    environment:
      - DATABASE_URL=postgresql://cafe_user:cafe_password@db_postgres:5432/cafeteria_db
      - SECRET_KEY=CafeteriaPro_ISC_UPQ_2026_SecretKey
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=480   # 8 horas (turno de trabajo)
    depends_on:
      db_postgres:
        condition: service_healthy   # espera a que Postgres esté listo de verdad
    networks:
      - cafeteria_network

  # ─────────────────────────────────────────
  # 2. APP WEB  ──  Flask + Python
  #    Solo frontend: consume la API.
  #    Módulos: Usuarios/Roles + Estadísticas
  # ─────────────────────────────────────────
  cafeteria_web:
    build:
      context: ./Web
    container_name: cafeteria_web
    restart: unless-stopped
    ports:
      - "8001:5000"        # http://localhost:8001
    volumes:
      - ./Web:/app
    environment:
      - API_BASE_URL=http://cafeteria_api:8000   # URL interna entre contenedores
      - FLASK_ENV=development
      - FLASK_DEBUG=1
    depends_on:
      - cafeteria_api
    networks:
      - cafeteria_network

  # ─────────────────────────────────────────
  # 3. BASE DE DATOS  ──  PostgreSQL 15
  #    Una sola BD compartida por API y Web
  # ─────────────────────────────────────────
  db_postgres:
    image: postgres:15-alpine
    container_name: cafeteria_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cafe_user
      POSTGRES_PASSWORD: cafe_password
      POSTGRES_DB: cafeteria_db
    ports:
      - "5433:5432"        # expuesto para conectar desde DBeaver/pgAdmin
    volumes:
      - postgres_data:/var/lib/postgresql/data   # datos persistentes
      - ./API/database/init.sql:/docker-entrypoint-initdb.d/init.sql  # crea las tablas al iniciar
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cafe_user -d cafeteria_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cafeteria_network

# ─────────────────────────────────────────
# RED  ──  comunicación interna entre servicios
# ─────────────────────────────────────────
networks:
  cafeteria_network:
    driver: bridge

# ─────────────────────────────────────────
# VOLUMEN  ──  datos de Postgres no se pierden
#              aunque el contenedor se borre
# ─────────────────────────────────────────
volumes:
  postgres_data:
